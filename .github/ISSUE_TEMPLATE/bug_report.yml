name: Bug report
description: Report a reproducible problem using safe, synthetic data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Document Intelligence. Do not attach confidential PDFs, keys, `.env` files, or private provider responses.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Give the smallest sequence that reproduces the problem, preferably with the bundled sample.
      placeholder: |
        1. Start with docker compose up --build -d
        2. Create the sample workspace
        3. Ask ...
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Installation
      options:
        - Docker Compose
        - Source with uv
        - Packaged wheel
        - Other
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Processing mode
      options:
        - Deterministic
        - OpenAI
        - Unsure
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, Python version if relevant, and project version or commit.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Include safe doctor output or error codes. Remove paths, document content, and secrets.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed confidential document content, credentials, and private provider data.
          required: true
